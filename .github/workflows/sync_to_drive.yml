name: Production Docs to Google Workspace Sync

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Execute Robust Sync Engine
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        shell: python
        run: |
          import os
          import subprocess
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          print("=== Phase 1: Validating Directory and Environment ===")
          docs_dir = 'docs'
          if not os.path.exists(docs_dir):
              print(f"Error: Target directory '{docs_dir}' does not exist.")
              exit(1)

          os.makedirs('staging', exist_ok=True)

          print("=== Phase 2: Compiling Markdown via Pandoc ===")
          found_files = False
          for root, dirs, files in os.walk(docs_dir):
              for file in files:
                  if file.lower().endswith('.md'):
                      found_files = True
                      md_path = os.path.join(root, file)
                      filename_no_ext = os.path.splitext(file)[0]
                      docx_path = os.path.join('staging', f"{filename_no_ext}.docx")
                      
                      print(f"Compiling asset: {md_path}")
                      try:
                          subprocess.run(
                              ['pandoc', md_path, '--resource-path', root, '-o', docx_path],
                              check=True, capture_output=True, text=True
                          )
                      except subprocess.CalledProcessError as e:
                          print(f"Pandoc Fatal Error on {file}: {e.stderr}")
                          exit(1)

          if not found_files:
              print("Execution Halted: No markdown files found.")
              exit(1)

          print("=== Phase 3: Initializing User Account Identity ===")
          try:
              # Authenticate directly using your own 5 TB storage profile profile
              creds = Credentials(
                  token=None,
                  refresh_token=os.environ['GDRIVE_REFRESH_TOKEN'],
                  client_id=os.environ['GDRIVE_CLIENT_ID'],
                  client_secret=os.environ['GDRIVE_CLIENT_SECRET'],
                  token_uri="https://oauth2.googleapis.com/token"
              )
              service = build('drive', 'v3', credentials=creds)
              print("User Account Session actively bound to pipeline client.")
          except Exception as e:
              print(f"OAuth2 Identity Authorization Failure: {e}")
              exit(1)

          print("=== Phase 4: Deploying Assets to Google Ingestion Engine ===")
          folder_id = os.environ['GDRIVE_FOLDER_ID']

          for filename in os.listdir('staging'):
              if filename.endswith('.docx'):
                  file_path = os.path.join('staging', filename)
                  doc_title = os.path.splitext(filename)[0]
                  
                  try:
                      query = f"name = '{doc_title}' and '{folder_id}' in parents and mimeType = 'application/vnd.google-apps.document' and trashed = false"
                      results = service.files().list(q=query, fields="files(id)").execute()
                      existing_files = results.get('files', [])
                      
                      media = MediaFileUpload(
                          file_path, 
                          mimetype='application/vnd.openxmlformats-officedocument.wordprocessingml.document', 
                          resumable=True
                      )
                      
                      if existing_files:
                          file_id = existing_files[0]['id']
                          print(f"-> Safely overwriting data inside active Doc: '{doc_title}' (ID: {file_id})")
                          service.files().update(fileId=file_id, media_body=media).execute()
                      else:
                          print(f"-> Creating brand new Google Doc on server: '{doc_title}'")
                          metadata = {
                              'name': doc_title,
                              'mimeType': 'application/vnd.google-apps.document',
                              'parents': [folder_id]
                          }
                          service.files().create(body=metadata, media_body=media).execute()
                  except Exception as e:
                      print(f"Google Drive API Transaction Error on file '{filename}': {e}")
                      exit(1)

          print("=== Pipeline Execution Successfully Finished! ===")